    <circle cx="60" cy="20" r="1" fill="#434C5E" />
    <circle cx="80" cy="20" r="1" fill="#434C5E" />
    <circle cx="20" cy="40" r="1" fill="#434C5E" />
    <circle cx="40" cy="40" r="1" fill="#434C5E" />
    <circle cx="60" cy="40" r="1" fill="#434C5E" />
    <circle cx="80" cy="40" r="1" fill="#434C5E" />
    <circle cx="20" cy="60" r="1" fill="#434C5E" />
    <circle cx="40" cy="60" r="1" fill="#434C5E" />
    <circle cx="60" cy="60" r="1" fill="#434C5E" />
    <circle cx="80" cy="60" r="1" fill="#434C5E" />

