    <circle cx="50" cy="35" r="8" stroke="#D08770" stroke-width="1" fill="none" />
    <circle cx="50" cy="35" r="5" fill="#D08770" />
    <rect x="47.5" y="33.5" width="1.2" height="1.2" fill="#ECEFF4" />
    <rect x="51.3" y="33.5" width="1.2" height="1.2" fill="#ECEFF4" />

    <!-- Laser -->
